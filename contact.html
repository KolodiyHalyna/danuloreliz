<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">PC shop</a>
    <div class="nav-links">
      <a href="index.html">Головна</a>
      <a href="card.html">Товари</a>
      <a href="contact.html" class="active">Контакти</a>
    </div>
  </nav>

  <main>
    <div class="contact-page">

      <h2 class="section-title" style="margin-bottom: 28px;">Зв'яжіться з нами</h2>

      <div class="contact-grid">

        <div class="contact-info animate__animated animate__fadeInLeft">
          <div class="info-card">
            <div class="info-icon">📍</div>
            <div class="info-label">Адреса</div>
            <div class="info-value">вул. Руська 12, м. Тернопіль</div>
          </div>
          <div class="info-card">
            <div class="info-icon">📞</div>
            <div class="info-label">Телефон</div>
            <div class="info-value">+38 (098) 230-40-65</div>
          </div>
          <div class="info-card">
            <div class="info-icon">📧</div>
            <div class="info-label">Email</div>
            <div class="info-value">pcshoptern@gmail.com</div>
          </div>
          <div class="info-card">
            <div class="info-icon">🕐</div>
            <div class="info-label">Графік роботи</div>
            <div class="info-value">Пн–Пт: 10:00–19:00</div>
          </div>
        </div>

        <div class="contact-form animate__animated animate__fadeInRight">
          <div class="form-title">Написати нам</div>
          <div class="form-group">
            <label for="name">Ім'я</label>
            <input type="text" id="name" placeholder="Ваше ім'я" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@example.com" />
          </div>
          <div class="form-group">
            <label for="message">Повідомлення</label>
            <textarea id="message" placeholder="Ваше запитання..."></textarea>
          </div>
          <a href="index.html" class="submit-btn">Надіслати →</a>
        </div>

      </div>
    </div>
  </main>

  <footer>
    <a href="index.html" class="footer-logo">PC shop</a>
    <p>2026 Усі права захищені</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
